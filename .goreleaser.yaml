version: 2
project_name: mls

builds:
  - id: mls
    main: ./main.go
    binary: mls
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

nfpms:
  - id: mls
    package_name: mls
    vendor: MrLeanStorage
    homepage: https://github.com/MohamedLamineAllal/MrLeanStorage
    maintainer: Mohamed Lamine Allal <allalmohamedlamine@gmail.com>
    description: High-performance storage cleanup tool
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin

release:
  github:
    owner: MohamedLamineAllal
    name: MrLeanStorage
  name_template: "Release {{ .Tag }}"
  header: |
    # MrLeanStorage {{ .Tag }}
    
    A high-performance storage cleanup tool for macOS, designed to safely and efficiently clean up large cache and temporary files.
  footer: |
    ## Installation
    Download the binary for your platform, or install via package manager (deb/rpm) provided above.
    
    See [README.md](https://github.com/MohamedLamineAllal/MrLeanStorage/blob/main/README.md) for installation and usage guides.

homebrew_tap:
  - repository:
      owner: MohamedLamineAllal
      name: homebrew-mls
    commit_author:
      name: goreleaserbot
      email: goreleaser@mohamed.dev
    homepage: https://github.com/MohamedLamineAllal/MrLeanStorage
    description: High-performance storage cleanup tool
    license: MIT
