version: 2
project_name: mls

builds:
  - id: mls
    main: ./main.go
    binary: mls
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    # Applies to your 'mls' build target defined above
    ids:
      - mls
    # Tarball is default, but we declare it cleanly
    formats:
      - tar.gz
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    # This replaces the broken 'goos' filter blocks
    # It converts the archive output format specifically for Windows
    format_overrides:
      - goos: windows
        format: zip

nfpms:
  - id: mls
    package_name: mls
    vendor: MrLeanStorage
    homepage: https://github.com/MohamedLamineAllal/MrLeanStorage
    maintainer: Mohamed Lamine Allal <allalmohamedlamine@gmail.com>
    description: High-performance storage cleanup tool
    formats:
      - deb
      - rpm
    # This maps your compiled binary into the package's install directory
    contents:
      - src: ./mls
        dst: /usr/local/bin/mls

release:
  github:
    owner: MohamedLamineAllal
    name: MrLeanStorage
  name_template: "Release {{ .Tag }}"
  header: |
    # MrLeanStorage {{ .Tag }}

    A high-performance storage cleanup tool for macOS, designed to safely and efficiently clean up large cache and files with your easy to setup custom configuration and paths pattern selection.
  footer: |
    See [README.md](https://github.com/MohamedLamineAllal/MrLeanStorage/blob/main/README.md) for installation and usage guides.

homebrew_casks:
  - repository:
      owner: MohamedLamineAllal
      name: homebrew-mls
    commit_author:
      name: goreleaserbot
      email: goreleaser@mohamed.dev
    homepage: https://github.com/MohamedLamineAllal/MrLeanStorage
    description: High-performance storage cleanup tool
    license: MIT
