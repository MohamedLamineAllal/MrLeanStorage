version: 2
project_name: mls

builds:
  - id: mls
    main: ./main.go
    binary: mls
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'
    format_overrides:
      - goos: windows
      - formats:
        - zip

nfpms:
  - id: mls
    package_name: mls
    vendor: MrLeanStorage
    homepage: https://github.com/MohamedLamineAllal/MrLeanStorage
    maintainer: Mohamed Lamine Allal <allalmohamedlamine@gmail.com>
    description: High-performance storage cleanup tool
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin

release:
  github:
    owner: MohamedLamineAllal
    name: MrLeanStorage
  name_template: "Release {{ .Tag }}"
  header: |
    # MrLeanStorage {{ .Tag }}

    A cross-platform high-performance storage cleanup tool for macOS, Linux, and Windows, designed to safely and efficiently clean up large cache and files with your easy to setup custom configuration and paths pattern selection.
  footer: |
    - See [README.md](https://github.com/MohamedLamineAllal/MrLeanStorage/blob/main/README.md) for installation and usage guides.
    - See [CHANGELOG.md](https://github.com/MohamedLamineAllal/MrLeanStorage/blob/main/CHANGELOG.md) for a full history of changes.

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "merge"

homebrew_casks:
  - name: mls
    repository:
      owner: MohamedLamineAllal
      name: homebrew-mls
      token: "{{ .Env.TAP_GITHUB_TOKEN }}"
    commit_author:
      name: goreleaserbot
      email: goreleaser@mohamed.dev
    homepage: https://github.com/MohamedLamineAllal/MrLeanStorage
    description: High-performance storage cleanup tool
    license: MIT
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/mls"]
          end


