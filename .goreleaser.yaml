version: 2
project_name: mls

builds:
  - id: mls
    main: ./main.go
    binary: mls
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: '{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}'

nfpms:
  - id: mls
    package_name: mls
    vendor: MacosLeanStorage
    homepage: https://github.com/MohamedLamineAllal/MacOSLeanStorage
    maintainer: Mohamed Lamine Allal <allalmohamedlamine@gmail.com>
    description: High-performance storage cleanup tool
    formats:
      - deb
      - rpm
    bindir: /usr/local/bin

release:
  github:
    owner: MohamedLamineAllal
    name: MacOSLeanStorage
  name_template: "Release {{ .Tag }}"
  header: |
    # MacosLeanStorage {{ .Tag }}
    
    A high-performance storage cleanup tool for macOS, designed to safely and efficiently clean up large cache and temporary files.
  footer: |
    ## Installation
    Download the binary for your platform, or install via package manager (deb/rpm) provided above.
    
    See [README.md](https://github.com/MohamedLamineAllal/MacOSLeanStorage/blob/main/README.md) for installation and usage guides.
