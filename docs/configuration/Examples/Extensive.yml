targets:
  - name: "Arc CacheStorage Cache"
    path: "~/Library/Application Support/Arc/User Data/**/CacheStorage/**"
    threshold_days: 3
    safety_level: 1
    type: "both"
  - name: "Arc File System"
    path: "~/Library/Application Support/Arc/User Data/**/File System/**"
    threshold_days: 3
    safety_level: 1
    type: "both"
  - name: "Chrome Global Cache"
    path: "~/Library/Caches/Google/Chrome/**"
    threshold_days: 3
    safety_level: 1
    type: "both"
  - name: "Chrome CacheStorage Cache"
    path: "~/Library/Application Support/Google/Chrome/**/CacheStorage/**"
    threshold_days: 3
    safety_level: 1
    type: "both"
  - name: "Chrome crx Cache"
    path: "~/Library/Application Support/Google/GoogleUpdater/crx_cache/**"
    threshold_days: 3
    safety_level: 1
    type: "both"
  - name: "Arc File System"
    path: "~/Library/Application Support/Google/Chrome/**/File System/**"
    threshold_days: 3
    safety_level: 1
    type: "both"
  - name: "Discord Cache"
    path: "~/Library/Application Support/discord/Cache/**"
    threshold_days: 3
    safety_level: 1
    type: "both"
  - name: "Slack CacheStorage"
    path: "~/Library/Containers/com.tinyspeck.slackmacgap/Data/Library/Application Support/Slack/Service Worker/CacheStorage/**"
    threshold_days: 7
    safety_level: 1
    type: "both"
  - name: "Slack CacheStorage"
    path: "~/Library/Containers/com.tinyspeck.slackmacgap/Data/Library/Application Support/Slack/Service Worker/CacheStorage/**"
    threshold_days: 7
    safety_level: 1
    type: "both"
  - name: "Microsoft Teams CacheStorage"
    path: "~/Library/Containers/com.microsoft.teams2/Data/Library/Application Support/Microsoft/MSTeams/**/CacheStorage/**"
    threshold_days: 7
    safety_level: 1
    type: "both"
  - name: "Cursor Cache"
    path: "~/Library/Application Support/Cursor/Cache/**"
    threshold_days: 7
    safety_level: 1
    type: "both"
  - name: "Cursor Cache/Cache_Data"
    path: "~/Library/Application Support/Cursor/Cache/Cache_Data/**"
    threshold_days: 7
    safety_level: 1
    type: "both"
  - name: "Cursor CachedStorage"
    path: "~/Library/Application Support/Cursor/Service Worker/CacheStorage/**"
    threshold_days: 7
    safety_level: 1
    type: "both"
  - name: "Cursor CachedExtensionVSIXs"
    path: "~/Library/Application Support/Cursor/CachedExtensionVSIXs/**"
    threshold_days: 7
    safety_level: 1
    type: "both"
  - name: "VSCode CachedData"
    path: "~/Library/Application Support/Code/CachedData/**"
    threshold_days: 7
    safety_level: 1
    type: "both"
  - name: "VSCode Cache/Cache_Data"
    path: "~/Library/Application Support/Code/Cache/Cache_Data/**"
    threshold_days: 7
    safety_level: 1
    type: "both"
  - name: "VSCode CachedStorage"
    path: "~/Library/Application Support/Code/Service Worker/CacheStorage/**"
    threshold_days: 7
    safety_level: 1
    type: "both"
  - name: "VSCode WebStorage CacheStorage"
    path: "~/Library/Application Support/Code/WebStorage/**/CacheStorage/**"
    threshold_days: 7
    safety_level: 1
    type: "both"
  - name: "VSCode CachedExtensionVSIXs"
    path: "~/Library/Application Support/Code/CachedExtensionVSIXs/**"
    threshold_days: 7
    safety_level: 1
    type: "both"
  - name: "OpenAI Atlas Cache"
    path: "~/Library/Caches/com.openai.atlas/**"
    threshold_days: 3
    safety_level: 1
    type: "both"
  - name: "OpenAI Atlas CachedStorage"
    path: "~/Library/Application Support/com.openai.atlas/**/Service Worker/CacheStorage/**"
    threshold_days: 7
    safety_level: 1
    type: "both"
  - name: "OpenAI Atlas File System"
    path: "~/Library/Application Support/com.openai.atlas/**/File System/**"
    threshold_days: 7
    safety_level: 1
    type: "both"
  - name: "OpenAI Atlas extensions_crx_cache"
    path: "~/Library/Application Support/com.openai.atlas/**/extensions_crx_cache/**"
    threshold_days: 7
    safety_level: 1
    type: "both"
  - name: "Telegram Cache"
    path: "~/Library/Caches/ru.keepcoder.Telegram/*"
    threshold_days: 3
    safety_level: 1
    type: "both"
  - name: "Telegram Desktop Media Cache"
    path: "~/Library/Application Support/Telegram Desktop/tdata/user_data/media_cache/**"
    threshold_days: 7
    safety_level: 1
    type: "both"
  - name: "Telegram Desktop Cache"
    path: "~/Library/Application Support/Telegram Desktop/tdata/user_data/cache/**"
    threshold_days: 7
    safety_level: 1
    type: "both"
  - name: "Figma Local Storage"
    path: "~/Library/Application Support/Figma/Local Storage/**"
    threshold_days: 7
    safety_level: 1
    type: "both"
  - name: "Figma Local Storage"
    path: "~/Library/Application Support/Figma/**/Cache/**"
    threshold_days: 7
    safety_level: 1
    type: "both"
  - name: "Spotify Cache"
    path: "~/Library/Caches/com.spotify.client/**"
    threshold_days: 3
    safety_level: 1
    type: "both"
  - name: "Go Build Cache"
    path: "~/Library/Caches/go-build/**"
    threshold_days: 7
    safety_level: 1
    type: "both"
  - name: "Homebrew Cache"
    path: "~/Library/Caches/Homebrew/**"
    threshold_days: 14
    safety_level: 1
    type: "both"
  - name: "npm/node-gyp"
    path: "~/Library/Caches/node-gyp/**"
    threshold_days: 14
    safety_level: 1
    type: "both"
  - name: "pip/pnpm Cache"
    path: "~/Library/Caches/pip/**"
    threshold_days: 14
    safety_level: 1
    type: "both"
  - name: "Microsoft OneNote notes backup"
    path: "~/Library/Containers/com.microsoft.onenote.mac/Data/Library/Application Support/Microsoft User Data/OneNote/*/Backup/**"
    threshold_days: 30
    safety_level: 1
    type: "both"
  - name: "Updaters caches"
    path: "~/Library/Application Support/Caches/**/updater/**"
    threshold_days: 7
    safety_level: 1
    type: "both"
  - name: "PNPM Store Prune"
    command: "pnpm store prune"
    interval_days: 30
    safety_level: 1
  - name: "npm clean cache"
    command: "npm cache clean --force && rm -rf ~/.npm/_npx"
    interval_days: 30
    safety_level: 1
dry_run: true
ignore_patterns:
  - ".DS_Store"
  - "._*"
  - ".Spotlight-V100"
  - ".Trashes"
  - ".fseventsd"
schedule: "0 0 * * *" # Daily at midnight
