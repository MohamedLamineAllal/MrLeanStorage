targets:
  - name: "Arc Cache"
    path: "~/Library/Application Support/Arc/User Data/*/Cache"
    threshold_days: 3
    safety_level: 1
    type: "folder"
  - name: "Chrome Global Cache"
    path: "~/Library/Caches/Google/Chrome"
    threshold_days: 3
    safety_level: 1
    type: "file"
  - name: "Discord Cache"
    path: "~/Library/Application Support/discord/Cache"
    threshold_days: 3
    safety_level: 1
    type: "file"
  - name: "Cursor CachedData"
    path: "~/Library/Application Support/Cursor/CachedData"
    threshold_days: 3
    safety_level: 1
    type: "folder"
  - name: "VSCode CachedData"
    path: "~/Library/Application Support/Code/CachedData"
    threshold_days: 3
    safety_level: 1
    type: "folder"
  - name: "VSCode Workspace Storage"
    path: "~/Library/Application Support/Code/User/workspaceStorage"
    threshold_days: 7
    safety_level: 2
    type: "folder"
  - name: "OpenAI Atlas Cache"
    path: "~/Library/Caches/com.openai.atlas"
    threshold_days: 3
    safety_level: 1
    type: "file"
  - name: "Telegram Cache"
    path: "~/Library/Caches/ru.keepcoder.Telegram"
    threshold_days: 3
    safety_level: 1
    type: "file"
  - name: "Figma Local Storage"
    path: "~/Library/Application Support/Figma/Local Storage"
    threshold_days: 3
    safety_level: 1
    type: "folder"
  - name: "Spotify Cache"
    path: "~/Library/Caches/com.spotify.client"
    threshold_days: 3
    safety_level: 1
    type: "file"
  - name: "Go Build Cache"
    path: "~/Library/Caches/go-build"
    threshold_days: 7
    safety_level: 1
    type: "folder"
  - name: "Homebrew Cache"
    path: "~/Library/Caches/Homebrew"
    threshold_days: 14
    safety_level: 1
    type: "folder"
  - name: "npm/node-gyp"
    path: "~/Library/Caches/node-gyp"
    threshold_days: 14
    safety_level: 1
    type: "folder"
  - name: "pip/pnpm Cache"
    path: "~/Library/Caches/pip"
    threshold_days: 14
    safety_level: 1
    type: "folder"
  - name: "Microsoft OneNote notes backup"
    path: "~/Library/Containers/com.microsoft.onenote.mac/Data/Library/Application Support/Microsoft User Data/OneNote/*/Backup"
    threshold_days: 30
    safety_level: 1
    type: "folder"
dry_run: true
schedule: "0 0 * * *" # Daily at midnight
